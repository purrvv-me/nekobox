# Netlify build config for the main NekoBox Next.js app (this file only
# applies to the repo root — stage2-3/ is a separate, standalone mini-project
# and is not deployed here).
#
# @netlify/plugin-nextjs handles App Router SSR, API routes (as Netlify
# Functions, Node.js runtime — needed for the native argon2 module and fs
# access in server components) and middleware (as a Netlify Edge Function —
# src/middleware.ts only uses Web Crypto + string building, no Node-only APIs,
# so it's edge-compatible as-is).

[build]
  command = "npm run build"
  publish = ".next"

[[plugins]]
  package = "@netlify/plugin-nextjs"

[build.environment]
  NODE_VERSION = "20"
